<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Cart Tracker - Edit (Jurassic Park)</title>
        <link rel="icon" href="/static/favicon-edit.svg" type="image/svg+xml">
        <link rel="stylesheet" href="/static/edit.css">
    </head>
    <body>
        <header>
            <div class="title">
                <span class="icon">🦖</span>
                <h1>Edit Carts &middot; Jurassic Park</h1>
            </div>
            <div class="status">
                <span id="conn-status" class="connecting">◐ Connecting…</span>
                <span id="status" class="connecting">Loading…</span>
                <button id="reload-btn" type="button">Reload</button>
                <!-- POST (not a link) so it can't be triggered cross-site as a GET -->
                <form action="/logout" method="post">
                    <button type="submit" title="Log out of the edit session">Log out</button>
                </form>
            </div>
        </header>

        <div id="stale-banner" hidden>
            <span>⚠️ Jurassic Park carts have changed since this list loaded.</span>
            <button id="stale-reload" type="button">Reload</button>
        </div>

        <main id="cart-list">
            <!-- rows injected by edit.js -->
        </main>

        <!-- Shown by saveCart() when saving while the list is stale. No backdrop/Esc
             dismissal: the operator must pick Reload or Proceed. -->
        <div id="stale-modal" class="modal-overlay" hidden>
            <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="stale-modal-msg">
                <p id="stale-modal-msg" class="modal-msg">The cart list changed since you loaded. Reloading is recommended.</p>
                <div class="modal-actions">
                    <button id="stale-modal-reload" type="button" class="modal-reload">Reload</button>
                    <button id="stale-modal-proceed" type="button" class="modal-proceed">Proceed</button>
                </div>
            </div>
        </div>

        <script src="/static/edit.js"></script>
    </body>
</html>
