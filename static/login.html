<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Cart Tracker - Login</title>
        <link rel="icon" href="/static/favicon-login.svg" type="image/svg+xml">
        <!-- Self-contained styling: shares the dashboard/edit dark palette but the
             login screen is a single centered card, so it carries its own <style>
             rather than pulling in edit.css's header/grid rules. -->
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            html, body {
                min-height: 100vh;
                background: #0f1419;
                color: #e6e6e6;
                font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1.5rem;
            }

            .login-card {
                width: 100%;
                max-width: 360px;
                background: rgba(36, 48, 66, 0.85);
                border: 1px solid #2a3540;
                border-radius: 14px;
                padding: 2rem 1.75rem;
            }

            .title {
                display: flex;
                align-items: center;
                gap: 0.6rem;
                margin-bottom: 1.5rem;
            }
            .title .icon { font-size: 1.8rem; }
            h1 {
                font-size: 1.35rem;
                font-weight: 700;
                letter-spacing: -0.01em;
            }

            label {
                display: block;
                font-size: 0.72rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #7a8a9a;
                margin-bottom: 0.35rem;
            }

            input[type="password"] {
                font-family: inherit;
                font-size: 1rem;
                color: #ffffff;
                background: #0f1723;
                border: 1px solid #3a4a63;
                border-radius: 8px;
                padding: 0.6rem 0.7rem;
                width: 100%;
            }
            input[type="password"]:focus {
                outline: none;
                border-color: #6a8fc2;
                box-shadow: 0 0 0 2px rgba(106, 143, 194, 0.25);
            }

            button {
                margin-top: 1.25rem;
                width: 100%;
                font-family: inherit;
                font-size: 0.95rem;
                font-weight: 600;
                color: #ffffff;
                background: #2e7d32;
                border: 1px solid #3a9d40;
                border-radius: 8px;
                padding: 0.6rem 0.9rem;
                cursor: pointer;
                transition: background 0.15s ease, border-color 0.15s ease;
            }
            button:hover  { background: #369140; border-color: #46b552; }
            button:active { transform: translatey(1px); }

            .error {
                margin-top: 1rem;
                padding: 0.55rem 0.75rem;
                background: rgba(244, 67, 54, 0.15);
                border: 1px solid #f44336;
                border-radius: 8px;
                color: #f44336;
                font-size: 0.85rem;
                font-weight: 600;
                text-align: center;
            }
            .error[hidden] { display: none; }
        </style>
    </head>
    <body>
        <form class="login-card" method="post" action="/login">
            <div class="title">
                <span class="icon">🦖</span>
                <h1>Cart Tracker Login</h1>
            </div>

            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   autocomplete="current-password" autofocus required>

            <button type="submit">Log in</button>

            <!-- Shown only when the server redirected back with ?error=1 -->
            <p id="error" class="error" hidden>Incorrect password. Try again.</p>
        </form>

        <script>
            // The POST handler redirects to /login?error=1 on a bad password.
            // Reveal the message client-side so the page stays a single static file.
            if (new URLSearchParams(location.search).get('error')) {
                document.getElementById('error').hidden = false;
            }
        </script>
    </body>
</html>
