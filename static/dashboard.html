<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Cart Tracker - Live Dashboard</title>
        <link rel="stylesheet" href="/static/styles.css">
    </head>
    <body>
        <header>
            <div class="title">
                <h1>Cart Tracker</h1>
            </div>
            <div class='status'>
                <span id="connection-status" class="connecting">Connecting...</span>
                <span id="updated">Awaiting first update...</span>
            </div>
        </header>

        <main id="board">
            <section class="column" data-location="Jurassic Park">
                <div class="column-header">
                    <span class="icon">🦖</span>
                    <h2>Jurassic Park</h2>
                    <span class="count" data-count-for="Jurassic Park">0</span>
                </div>
                <div class="cards" data-cards-for="Jurassic Park"></div>
            </section>

            <section class="column" data-location="JIT">
                <div class="column-header">
                    <span class="icon">🏃</span>
                    <h2>JIT</h2>
                    <span class="count" data-count-for="JIT">0</span>
                </div>
                <div class="cards" data-cards-for="JIT"></div>
            </section>

            <section class="column" data-location="MAL">
                <div class="column-header">
                    <span class="icon airlock-icon">
                        <!-- Airlock SVG (inline so it inherits color) -->
                        <svg viewBox="0 0 24 24" width="32" height="32" fill="none"
                            stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="2" width="16" height="20" rx="2"/>
                            <circle cx="12" cy="12" r="5"/>
                            <circle cx="12" cy="12" r="2"/>
                            <line x1="12" y1="7" x2="12" y2="9"/>
                            <line x1="12" y1="15" x2="12" y2="17"/>
                            <line x1="7" y1="12" x2="9" y2="12"/>
                            <line x1="15" y1="12" x2="17" y2="12"/>
                        </svg>
                    </span>
                    <h2>MAL</h2>
                    <span class="count" data-count-for="MAL">0</span>
                </div>
                <div class="cards" data-cards-for="MAL"></div>
            </section>
        </main>

        <script src="/static/app.js"></script>
    </body>
</html>
