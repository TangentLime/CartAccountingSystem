<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded tile matches the app background (#0f1419) so the emoji reads
       on both light and dark browser tab bars. -->
  <rect width="64" height="64" rx="14" fill="#0f1419"/>
  <!-- Cart = the whole tracker, not tied to any single zone. -->
  <text x="32" y="47" font-size="38" text-anchor="middle">🛒</text>
</svg>
